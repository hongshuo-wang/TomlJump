name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  jetbrains-plugin:
    name: Build and publish JetBrains plugin ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Derive release version from tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v0.1.0 or v0.1.0-beta.1, got ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Building TomlJump ${version} from ${tag}"

      - name: Build plugin ZIP
        run: ./gradlew :plugins:jetbrains:buildPlugin -PpluginVersion="${{ steps.release.outputs.version }}"

      - name: Locate plugin ZIP
        id: artifact
        shell: bash
        run: |
          zip_path="$(find plugins/jetbrains/build/distributions -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"

          if [[ -z "${zip_path}" ]]; then
            echo "No ZIP found under plugins/jetbrains/build/distributions" >&2
            exit 1
          fi

          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=$(basename "${zip_path}")" >> "${GITHUB_OUTPUT}"
          echo "Located ${zip_path}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.zip_name }}
          path: ${{ steps.artifact.outputs.zip_path }}
          if-no-files-found: error

      - name: Create GitHub release and upload ZIP
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          ZIP_PATH: ${{ steps.artifact.outputs.zip_path }}
        shell: bash
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ZIP_PATH}" --clobber
          else
            gh release create "${TAG}" "${ZIP_PATH}" --title "${TAG}" --generate-notes
          fi
