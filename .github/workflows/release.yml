name: Release

"on":
  workflow_dispatch:
    inputs:
      target:
        description: Product line to publish
        required: true
        type: choice
        options:
          - jetbrains
          - vscode
          - all
      tag:
        description: Existing shared v<version> release tag
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate selected target and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate release selection
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          result="$(node plugins/vscode/scripts/validate-release.mjs "${RELEASE_TARGET}" "${RELEASE_TAG}" .)"
          version="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).version)' "${result}")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Validated ${RELEASE_TARGET} release ${version} from ${RELEASE_TAG}"

  jetbrains-build:
    name: Verify and build JetBrains plugin
    if: inputs.target != 'vscode'
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run core tests, JetBrains tests, and plugin build
        env:
          ORG_GRADLE_PROJECT_pluginVersion: ${{ needs.prepare.outputs.version }}
        run: ./scripts/verify/jetbrains.sh

      - name: Locate exact plugin ZIP
        id: artifact
        shell: bash
        run: |
          zip_path="plugins/jetbrains/build/distributions/jetbrains-${{ needs.prepare.outputs.version }}.zip"
          if [[ ! -f "${zip_path}" ]]; then
            echo "Missing expected JetBrains ZIP ${zip_path}" >&2
            exit 1
          fi
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload unsigned plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: jetbrains-${{ needs.prepare.outputs.version }}-unsigned
          path: ${{ steps.artifact.outputs.zip_path }}
          if-no-files-found: error

  jetbrains-compatibility:
    name: Verify ${{ matrix.name }} compatibility
    if: inputs.target != 'vscode'
    needs:
      - prepare
      - jetbrains-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: IntelliJ IDEA Community 2024.3
            id: idea-2024.3
            type: IC
            version: "2024.3"
          - name: PyCharm 2024.3
            id: pycharm-2024.3
            type: PY
            version: "2024.3"
          - name: GoLand 2024.3
            id: goland-2024.3
            type: GO
            version: "2024.3"
          - name: WebStorm 2024.3
            id: webstorm-2024.3
            type: WS
            version: "2024.3"
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download unsigned plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: jetbrains-${{ needs.prepare.outputs.version }}-unsigned
          path: verified-plugin

      - name: Run JetBrains Plugin Verifier
        run: >
          ./gradlew :plugins:jetbrains:verifyPlugin -x buildPlugin
          -PpluginVersion="${{ needs.prepare.outputs.version }}"
          -PpluginArchivePath="verified-plugin/jetbrains-${{ needs.prepare.outputs.version }}.zip"
          -PverifierIde="${{ matrix.type }}"
          -PverifierIdeVersion="${{ matrix.version }}"

      - name: Upload Plugin Verifier report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-${{ matrix.id }}
          path: plugins/jetbrains/build/reports/pluginVerifier/
          if-no-files-found: ignore

  jetbrains-publish:
    name: Sign and publish JetBrains plugin
    if: inputs.target != 'vscode'
    needs:
      - prepare
      - jetbrains-build
      - jetbrains-compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download verified plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: jetbrains-${{ needs.prepare.outputs.version }}-unsigned
          path: verified-plugin

      - name: Sign and publish plugin to JetBrains Marketplace
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: >
          ./gradlew :plugins:jetbrains:publishPlugin -x buildPlugin
          -PpluginVersion="${{ needs.prepare.outputs.version }}"
          -PpluginArchivePath="verified-plugin/jetbrains-${{ needs.prepare.outputs.version }}.zip"

      - name: Locate exact signed plugin ZIP
        id: signed
        shell: bash
        run: |
          zip_path="verified-plugin/jetbrains-${{ needs.prepare.outputs.version }}-signed.zip"
          if [[ ! -f "${zip_path}" ]]; then
            echo "Missing expected signed JetBrains ZIP ${zip_path}" >&2
            exit 1
          fi
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload signed workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: jetbrains-${{ needs.prepare.outputs.version }}-signed
          path: ${{ steps.signed.outputs.zip_path }}
          if-no-files-found: error

  vscode-build:
    name: Verify and package VS Code extension
    if: inputs.target != 'jetbrains'
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/vscode/package-lock.json

      - name: Verify and package extension
        run: ./scripts/verify/vscode.sh

      - name: Locate exact VSIX
        id: artifact
        shell: bash
        run: |
          vsix_path="plugins/vscode/build/tomljump-vscode-${{ needs.prepare.outputs.version }}.vsix"
          if [[ ! -f "${vsix_path}" ]]; then
            echo "Missing expected VSIX ${vsix_path}" >&2
            exit 1
          fi
          echo "vsix_path=${vsix_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload verified VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: tomljump-vscode-${{ needs.prepare.outputs.version }}
          path: ${{ steps.artifact.outputs.vsix_path }}
          if-no-files-found: error

  vscode-publish:
    name: Publish VS Code-compatible extension
    if: inputs.target != 'jetbrains'
    needs:
      - prepare
      - vscode-build
    runs-on: ubuntu-latest
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/vscode/package-lock.json

      - name: Install pinned publishing tools
        run: npm ci
        working-directory: plugins/vscode

      - name: Download verified VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: tomljump-vscode-${{ needs.prepare.outputs.version }}
          path: verified-extension

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: plugins/vscode
        run: >
          npx vsce publish
          --skip-duplicate
          --packagePath "../../verified-extension/tomljump-vscode-${{ needs.prepare.outputs.version }}.vsix"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        working-directory: plugins/vscode
        run: >
          npx ovsx publish
          --skip-duplicate
          "../../verified-extension/tomljump-vscode-${{ needs.prepare.outputs.version }}.vsix"

  github-release:
    name: Create shared GitHub release
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      (inputs.target == 'vscode' || needs.jetbrains-publish.result == 'success') &&
      (inputs.target == 'jetbrains' || needs.vscode-publish.result == 'success')
    needs:
      - prepare
      - jetbrains-publish
      - vscode-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out selected tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Download signed JetBrains plugin
        if: inputs.target != 'vscode'
        uses: actions/download-artifact@v8
        with:
          name: jetbrains-${{ needs.prepare.outputs.version }}-signed
          path: release-assets/jetbrains

      - name: Download VS Code extension
        if: inputs.target != 'jetbrains'
        uses: actions/download-artifact@v8
        with:
          name: tomljump-vscode-${{ needs.prepare.outputs.version }}
          path: release-assets/vscode

      - name: Select Chinese release notes
        env:
          RELEASE_TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          case "${RELEASE_TARGET}" in
            jetbrains) cp .github/release-notes-jetbrains.md release-notes-selected.md ;;
            vscode) cp .github/release-notes-vscode.md release-notes-selected.md ;;
            all) cp .github/release-notes.md release-notes-selected.md ;;
            *) echo "Unsupported release target ${RELEASE_TARGET}" >&2; exit 1 ;;
          esac
          test -s release-notes-selected.md

      - name: Create or update release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes-selected.md
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes-selected.md
          fi

      - name: Upload signed JetBrains plugin
        if: inputs.target != 'vscode'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: >
          gh release upload "${TAG}"
          "release-assets/jetbrains/jetbrains-${{ needs.prepare.outputs.version }}-signed.zip"
          --clobber

      - name: Upload VS Code extension
        if: inputs.target != 'jetbrains'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: >
          gh release upload "${TAG}"
          "release-assets/vscode/tomljump-vscode-${{ needs.prepare.outputs.version }}.vsix"
          --clobber
